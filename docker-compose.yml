services:
  iperf-runner:
    build: .
    image: iperf-stress-test:latest
    container_name: iperf-stress-test
    ports:
      - "8800:8800"
    environment:
      - IPERF_DATA_DIR=/data
      # Optional: supply a Fernet key out-of-band so it isn't sitting next to the DB.
      # - IPERF_SECRET_KEY=replace-with-Fernet.generate_key()
    volumes:
      - ./data:/data
    restart: unless-stopped
    # Uncomment if firewalls are reachable only from the host network (Linux only):
    # network_mode: host
