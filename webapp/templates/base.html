<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SD-WAN iPerf{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        (function () {
            try {
                const t = localStorage.getItem("theme") || "dark";
                document.documentElement.setAttribute("data-theme", t);
            } catch (e) {}
        })();
    </script>
</head>
<body>
{% set path = request.url.path %}
<aside class="sidebar">
    <a class="brand" href="/">
        <span class="brand-mark" aria-label="Fortinet">
            <svg class="brand-logo" viewBox="53 53 77 54" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="currentColor" d="M129.7,73.1v13.8h0h-21.5V73.1l0,0H129.7L129.7,73.1L129.7,73.1z M80.8,106.6L80.8,106.6l21.5,0v0V92.8H80.8 V106.6z M129.7,64.9c0-6.4-5.2-11.6-11.6-11.6l-9.9,0v13.8h21.5V64.9z M80.8,53.3v13.8l0,0h21.5l0,0V53.3v0L80.8,53.3L80.8,53.3z M53.3,73.1L53.3,73.1v13.8l0,0h21.5V73.1l0,0H53.3L53.3,73.1z M108.2,106.6l9.9,0c6.4,0,11.6-5.2,11.6-11.6v-2.2h-21.5V106.6z M53.3,95c0,6.4,5.2,11.6,11.6,11.6l9.9,0V92.8H53.3V95z M53.3,64.9v2.2h21.5V53.3l-9.9,0C58.5,53.3,53.3,58.5,53.3,64.9z"/>
            </svg>
        </span>
        <span class="brand-text">SD-WAN iPerf</span>
    </a>
    <nav class="side-nav">
        <a href="/" {% if path == '/' %}aria-current="page"{% endif %}>
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
            </span>
            Dashboard
        </a>
        <a href="/devices" {% if path.startswith('/devices') %}aria-current="page"{% endif %}>
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="13" width="18" height="7" rx="1.5"/><path d="M7 7.5h.01"/><path d="M7 16.5h.01"/><path d="M11 7.5h6"/><path d="M11 16.5h6"/></svg>
            </span>
            Devices
        </a>
        <a href="/archive" {% if path.startswith('/archive') %}aria-current="page"{% endif %}>
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
            </span>
            Archive
        </a>
        <a href="/schedules" {% if path.startswith('/schedules') %}aria-current="page"{% endif %}>
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/><circle cx="12" cy="15.5" r="2.25"/><path d="M12 14v1.5l1 .8"/></svg>
            </span>
            Schedules
        </a>
    </nav>
    <div class="sidebar-footer"></div>
</aside>

<button id="theme-toggle" class="theme-toggle-icon" type="button" aria-label="Toggle theme" title="Toggle theme">
    <span id="theme-toggle-glyph">☾</span>
</button>

<main class="main-area">
    {% block content %}{% endblock %}
</main>

<div id="run-bar" class="run-bar" role="status" aria-live="polite">
    <div class="run-bar-row">
        <span class="run-bar-dot" aria-hidden="true"></span>
        <span class="run-bar-label" id="run-bar-label">Run in progress</span>
        <span class="run-bar-status-pill" id="run-bar-pill" hidden></span>
        <span class="run-bar-count" id="run-bar-count"></span>
        <div class="run-bar-track"><div class="run-bar-fill indeterminate" id="run-bar-fill"></div></div>
        <span class="run-bar-detail" id="run-bar-detail"></span>
        <a class="run-bar-link" id="run-bar-link" href="#">View run</a>
        <button type="button" id="run-bar-toggle" class="run-bar-toggle" aria-expanded="false" aria-controls="run-bar-panel" aria-label="Expand">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 15 12 9 18 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>
    <div class="run-bar-panel" id="run-bar-panel" hidden>
        <section class="run-bar-section" id="run-bar-active-section" hidden>
            <h4>Current run</h4>
            <div class="run-bar-active-meta" id="run-bar-active-meta"></div>
            <pre class="run-bar-log" id="run-bar-log"></pre>
        </section>
        <section class="run-bar-section" id="run-bar-history-section">
            <h4>Recent runs</h4>
            <div class="run-bar-history" id="run-bar-history"></div>
        </section>
    </div>
</div>

<script>
(function () {
    const btn = document.getElementById("theme-toggle");
    const glyph = document.getElementById("theme-toggle-glyph");
    function apply(t) {
        document.documentElement.setAttribute("data-theme", t);
        // Show the icon for the theme you'll switch TO.
        glyph.textContent = t === "dark" ? "☀" : "☾";
        btn.setAttribute("aria-label", t === "dark" ? "Switch to light theme" : "Switch to dark theme");
    }
    apply(document.documentElement.getAttribute("data-theme") || "dark");
    btn.addEventListener("click", () => {
        const cur = document.documentElement.getAttribute("data-theme") || "dark";
        const next = cur === "dark" ? "light" : "dark";
        try { localStorage.setItem("theme", next); } catch (e) {}
        apply(next);
        document.dispatchEvent(new CustomEvent("themechange", { detail: next }));
    });
})();
</script>

<script>
(function () {
    const bar = document.getElementById("run-bar");
    const fill = document.getElementById("run-bar-fill");
    const count = document.getElementById("run-bar-count");
    const detail = document.getElementById("run-bar-detail");
    const link = document.getElementById("run-bar-link");
    const label = document.getElementById("run-bar-label");
    const pill = document.getElementById("run-bar-pill");
    const toggle = document.getElementById("run-bar-toggle");
    const panel = document.getElementById("run-bar-panel");
    const activeSection = document.getElementById("run-bar-active-section");
    const activeMeta = document.getElementById("run-bar-active-meta");
    const logBox = document.getElementById("run-bar-log");
    const historyBox = document.getElementById("run-bar-history");
    let timer = null;
    let pollMs = 8000;
    let expanded = false;
    try { expanded = localStorage.getItem("run-bar-expanded") === "1"; } catch (e) {}

    function applyExpanded() {
        bar.classList.toggle("expanded", expanded);
        document.body.classList.toggle("run-bar-expanded", expanded && bar.classList.contains("visible"));
        panel.hidden = !expanded;
        toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
        toggle.setAttribute("aria-label", expanded ? "Collapse" : "Expand");
    }
    toggle.addEventListener("click", () => {
        expanded = !expanded;
        try { localStorage.setItem("run-bar-expanded", expanded ? "1" : "0"); } catch (e) {}
        applyExpanded();
    });

    function hide() {
        bar.classList.remove("visible", "idle");
        document.body.classList.remove("has-run-bar", "run-bar-expanded");
    }
    function fmtTime(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        const now = new Date();
        const diff = (now - d) / 1000;
        if (diff < 60) return "just now";
        if (diff < 3600) return Math.floor(diff / 60) + "m ago";
        if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }
    function statusPillHtml(status) {
        const s = (status || "").toLowerCase();
        const cls = s === "done" ? "ok" : (s === "error" ? "err" : "");
        return '<span class="run-bar-status-pill ' + cls + '">' + (s || "unknown") + '</span>';
    }
    function renderHistory(history) {
        if (!history || !history.length) {
            historyBox.innerHTML = '<div class="run-bar-history-empty">No previous runs yet.</div>';
            return;
        }
        const rows = history.map(h => {
            let counts = "";
            if (typeof h.successful_sites === "number" || typeof h.failed_sites === "number") {
                counts = (h.successful_sites || 0) + " pass · " + (h.failed_sites || 0) + " fail";
            } else if (typeof h.total_sites === "number") {
                counts = h.total_sites + " site(s)";
            }
            const when = fmtTime(h.finished_at || h.started_at);
            return (
                '<div class="run-bar-history-row">' +
                  '<code>' + h.id + '</code>' +
                  statusPillHtml(h.status) +
                  '<span class="counts">' + counts + '</span>' +
                  '<span class="when">' + when + '</span>' +
                  '<a href="/run/' + h.id + '">View</a>' +
                '</div>'
            );
        });
        historyBox.innerHTML = rows.join("");
    }
    function renderActive(j) {
        activeSection.hidden = false;
        const meta = [];
        if (j.source) meta.push('<span class="muted">Source:</span> ' + j.source);
        if (j.started_at) meta.push('<span class="muted">Started:</span> ' + fmtTime(j.started_at));
        if (typeof j.total === "number" && j.total > 0) {
            meta.push('<span class="muted">Progress:</span> ' + (j.current || 0) + ' / ' + j.total);
        }
        activeMeta.innerHTML = meta.join(" · ");
        const tail = j.log_tail || [];
        logBox.textContent = tail.length ? tail.join("\n") : "Waiting for output…";
        logBox.scrollTop = logBox.scrollHeight;
    }
    function showRunning(j) {
        bar.classList.add("visible");
        bar.classList.remove("idle");
        document.body.classList.add("has-run-bar");
        label.textContent = "Run in progress";
        pill.hidden = true;
        link.href = "/run/" + j.id;
        link.textContent = "View run";
        if (typeof j.total === "number" && j.total > 0) {
            const cur = Math.min(j.current || 0, j.total);
            count.textContent = cur + " / " + j.total;
            fill.classList.remove("indeterminate");
            fill.style.width = Math.round((cur / j.total) * 100) + "%";
        } else {
            count.textContent = "";
            fill.classList.add("indeterminate");
            fill.style.width = "";
        }
        detail.textContent = j.message || "Running…";
        renderActive(j);
        renderHistory(j.history || []);
        applyExpanded();
    }
    function showIdle(j) {
        bar.classList.add("visible", "idle");
        document.body.classList.add("has-run-bar");
        label.textContent = "Last run";
        const status = (j.status || "").toLowerCase();
        pill.hidden = false;
        pill.textContent = status || "unknown";
        pill.classList.remove("ok", "err");
        if (status === "done") pill.classList.add("ok");
        else if (status === "error") pill.classList.add("err");
        const parts = [];
        if (typeof j.successful_sites === "number" || typeof j.failed_sites === "number") {
            const ok = j.successful_sites || 0;
            const fail = j.failed_sites || 0;
            parts.push(ok + " pass · " + fail + " fail");
        }
        const when = fmtTime(j.finished_at || j.started_at);
        if (when) parts.push(when);
        detail.textContent = parts.join(" · ");
        link.href = "/run/" + j.id;
        link.textContent = "View";
        activeSection.hidden = true;
        renderHistory(j.history || []);
        applyExpanded();
    }
    async function tick() {
        try {
            const r = await fetch("/jobs/active", { cache: "no-store" });
            if (!r.ok) { hide(); return; }
            const j = await r.json();
            if (j.state === "running") {
                pollMs = 2000;
                showRunning(j);
            } else if (j.state === "idle") {
                pollMs = 15000;
                showIdle(j);
            } else {
                pollMs = 15000;
                hide();
            }
            schedule();
        } catch (e) {
            schedule();
        }
    }
    function schedule() {
        clearTimeout(timer);
        timer = setTimeout(tick, pollMs);
    }
    function start() {
        clearTimeout(timer);
        tick();
    }
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { clearTimeout(timer); timer = null; }
        else { start(); }
    });
    start();
})();
</script>
</body>
</html>
